<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Comparisons - TechReview</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import "tailwindcss";
        :root {
            --bg: #f8f9fa;
            --ink: #1a1a1a;
            --accent: #3b82f6;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--ink); }
        .editorial-title { font-family: 'Playfair Display', serif; }
        .card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                        <i class="fas fa-bolt text-white text-sm"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tighter">TECH<span class="text-blue-600">REVIEW</span></span>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="/" class="text-sm font-medium hover:text-blue-600 transition-colors">Home</a>
                    <a href="/comparisons.html" class="text-sm font-medium text-blue-600">Comparisons</a>
                    <a href="/best-of-5.html" class="text-sm font-medium hover:text-blue-600 transition-colors">Best of 5</a>
                    <a href="/segments.html" class="text-sm font-medium hover:text-blue-600 transition-colors">Segments</a>
                    <a href="/budget.html" class="text-sm font-medium hover:text-blue-600 transition-colors">Budget</a>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/leader.html" class="text-xs font-bold uppercase tracking-widest px-4 py-2 border border-black hover:bg-black hover:text-white transition-all">Leader Panel</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="py-16 bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="editorial-title text-5xl md:text-6xl font-bold mb-4 italic">Head-to-Head Comparisons</h1>
            <p class="text-gray-500 max-w-2xl mx-auto text-lg">We put the latest tech side-by-side to help you decide which one truly deserves your money.</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div id="comparisonList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Comparisons will be loaded here -->
            <div class="col-span-full py-20 text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-gray-400">Loading comparisons...</p>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-100 py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-400 text-sm">© 2026 TechReview. All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function loadComparisons() {
            try {
                const response = await fetch('/api/list-items');
                const items = await response.json();
                
                const comparisons = items.filter(item => item.data.pageType === 'comparison');
                const listContainer = document.getElementById('comparisonList');
                
                if (comparisons.length === 0) {
                    listContainer.innerHTML = `
                        <div class="col-span-full py-20 text-center">
                            <i class="fas fa-layer-group text-4xl text-gray-200 mb-4"></i>
                            <p class="text-gray-400">No comparisons generated yet.</p>
                        </div>
                    `;
                    return;
                }

                listContainer.innerHTML = comparisons.map(comp => {
                    const item1 = comp.data.items[0] || { name: 'Item 1', heroImage: '' };
                    const item2 = comp.data.items[1] || { name: 'Item 2', heroImage: '' };
                    
                    return `
                        <a href="/${comp.id}.html" class="card bg-white rounded-2xl overflow-hidden border border-gray-100 group">
                            <div class="relative h-48 bg-gray-50 flex items-center justify-center p-4">
                                <div class="flex items-center gap-4 w-full">
                                    <div class="flex-1 text-center">
                                        <img src="${item1.heroImage || 'https://picsum.photos/seed/tech1/200/200'}" 
                                             class="h-24 w-auto mx-auto object-contain mb-2" 
                                             referrerpolicy="no-referrer">
                                        <p class="text-[10px] font-bold uppercase text-gray-400 truncate">${item1.name}</p>
                                    </div>
                                    <div class="text-xl font-black text-gray-200 italic">VS</div>
                                    <div class="flex-1 text-center">
                                        <img src="${item2.heroImage || 'https://picsum.photos/seed/tech2/200/200'}" 
                                             class="h-24 w-auto mx-auto object-contain mb-2" 
                                             referrerpolicy="no-referrer">
                                        <p class="text-[10px] font-bold uppercase text-gray-400 truncate">${item2.name}</p>
                                    </div>
                                </div>
                                <div class="absolute inset-0 bg-blue-600/0 group-hover:bg-blue-600/5 transition-colors"></div>
                            </div>
                            <div class="p-6">
                                <h2 class="text-xl font-bold mb-2 group-hover:text-blue-600 transition-colors">${comp.data.title || 'Product Comparison'}</h2>
                                <div class="flex items-center justify-between mt-4">
                                    <span class="text-xs font-bold uppercase tracking-widest text-gray-400">Comparison</span>
                                    <span class="text-blue-600 text-sm font-bold">Read Comparison <i class="fas fa-arrow-right ml-1"></i></span>
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error loading comparisons:', error);
                document.getElementById('comparisonList').innerHTML = '<p class="text-red-500 text-center col-span-full">Failed to load comparisons.</p>';
            }
        }

        window.onload = loadComparisons;
    </script>
</body>
</html>
